name: Fetch Google Reviews (Daily)

on:
  schedule:
    # 06:00 UTC = 07:00 München (MEZ) / 08:00 (MESZ)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Google Reviews
        run: npm run fetch-reviews -- --force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          GBP_TOKEN_ENCRYPTION_KEY: ${{ secrets.GBP_TOKEN_ENCRYPTION_KEY }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/google-reviews-*.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No review changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Review data changed — will commit."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/google-reviews-*.json
          git commit -m "data: Google Reviews aktualisiert ($(date +%Y-%m-%d))"
          git push

      - name: Telegram Alert on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🔴 <b>Reviews-Fetch fehlgeschlagen</b>%0A%0ARepo: ristorantestoria.de%0ATrigger: ${{ github.event_name }}%0A%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">→ Logs ansehen</a>"
