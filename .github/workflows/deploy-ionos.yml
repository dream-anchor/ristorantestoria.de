name: Deploy Lovable SSG to IONOS (SFTP)

on:
  push:
    branches:
      - main
      - feature/static-site-upgrade

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: deploy-ionos
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Project (SSG)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # VITE_* vars werden direkt aus der committeten .env gelesen.
          # Leere Secrets würden die .env-Werte überschreiben → absichtlich entfernt.

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess || echo "No .htaccess found"

      - name: Deploy via LFTP (parallel uploads)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 10;
            set mirror:parallel-directories yes;
            open -u ${{ secrets.IONOS_SFTP_USER }},${{ secrets.IONOS_SFTP_PASSWORD }} sftp://${{ secrets.IONOS_SFTP_HOST }};
            mirror --reverse --delete --verbose --parallel=10 ./dist/ ${{ secrets.IONOS_SFTP_TARGET_DIR }}/;
            quit;
          "

      - name: Telegram Alert on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🔴 <b>Deploy fehlgeschlagen</b>%0A%0ARepo: ristorantestoria.de%0ABranch: ${{ github.ref_name }}%0ACommit: <code>${{ github.sha }}</code>%0A%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">→ Logs ansehen</a>"
