name: Sync GBP Menu (Daily)

on:
  schedule:
    # Täglich um 09:00 UTC (10:00 Uhr MEZ / 11:00 Uhr MESZ)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync GBP Menu
        run: npx tsx scripts/sync-gbp-menu.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GBP_TOKEN_ENCRYPTION_KEY: ${{ secrets.GBP_TOKEN_ENCRYPTION_KEY }}

      - name: Report failure
        if: failure()
        run: |
          echo "::error::❌ GBP Menu Sync fehlgeschlagen! Prüfe die Logs oben für Details."
          echo "Mögliche Ursachen:"
          echo "  - Neon-Datenbank-Verbindung fehlgeschlagen"
          echo "  - Google OAuth Token abgelaufen (gbp-auth-test.ts erneut ausführen)"
          echo "  - API-Limit erreicht"
