name: Sync GBP Menu (Daily)

on:
  schedule:
    # Täglich um 09:00 UTC (10:00 Uhr MEZ / 11:00 Uhr MESZ)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync GBP Menu
        run: npx tsx scripts/sync-gbp-menu.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GBP_TOKEN_ENCRYPTION_KEY: ${{ secrets.GBP_TOKEN_ENCRYPTION_KEY }}

      - name: Telegram Alert on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🔴 <b>GBP Menu Sync fehlgeschlagen</b>%0A%0ARepo: ristorantestoria.de%0ATrigger: ${{ github.event_name }}%0A%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">→ Logs ansehen</a>"
