<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Consent Mode v2 - MUSS VOR gtag kommen! -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Standard: Alles auf 'denied' für DSGVO-Compliance
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied',
        'wait_for_update': 500
      });
    </script>

    <!-- Google Analytics — consent-gated via GoogleAnalytics.tsx -->
    
    <!-- Title, Meta, Canonical, OG, Twitter, Geo — all managed by React Helmet per page -->

    <!-- Preload critical fonts -->
    <link rel="preload" href="/fonts/CormorantGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#722F37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="STORIA" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.png?v=2" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />

    <!-- Microsoft Clarity — consent-gated via ClarityTracking.tsx -->

    <!-- LLMs.txt reference for AI crawlers -->
    <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM-readable content" />
    
    <!-- JSON-LD structured data is rendered dynamically by React StructuredData component -->
  </head>

  </body>
</html>
